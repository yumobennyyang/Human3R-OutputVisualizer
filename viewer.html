<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human3R Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08080e;
    color: #e0e0e0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  /* ── Loading / Drop Screen ── */
  #drop-screen {
    position: fixed; inset: 0;
    background: #08080e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    transition: opacity 0.6s;
  }
  #drop-screen.hidden { opacity: 0; pointer-events: none; }
  #drop-screen.drag-over { background: #0d1020; }

  .drop-zone {
    width: 420px; padding: 48px 40px;
    border: 2px dashed rgba(100,180,255,0.25);
    border-radius: 20px;
    text-align: center;
    transition: all 0.3s;
    background: rgba(100,180,255,0.03);
  }
  .drag-over .drop-zone {
    border-color: #64b4ff;
    background: rgba(100,180,255,0.08);
    transform: scale(1.02);
  }
  .drop-icon { font-size: 48px; margin-bottom: 16px; }
  .drop-title {
    font-size: 18px; font-weight: 600;
    color: #c0d8f0; margin-bottom: 8px;
  }
  .drop-subtitle {
    font-size: 13px; color: #667788;
    margin-bottom: 24px; line-height: 1.5;
  }
  .browse-btn {
    display: inline-block;
    padding: 10px 28px;
    background: rgba(100,180,255,0.12);
    border: 1px solid rgba(100,180,255,0.3);
    border-radius: 10px;
    color: #64b4ff; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .browse-btn:hover {
    background: rgba(100,180,255,0.2);
    border-color: #64b4ff;
  }
  #folder-input { display: none; }

  #load-status {
    margin-top: 20px; font-size: 12px;
    color: #556677; min-height: 18px;
  }
  .loader-ring {
    display: none;
    width: 36px; height: 36px;
    border: 3px solid rgba(100,180,255,0.15);
    border-top-color: #64b4ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 16px auto 0;
  }
  .loading .loader-ring { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Canvas ── */
  #canvas-container { position: fixed; inset: 0; }
  canvas { display: block; width: 100%; height: 100%; }

  /* ── Controls Panel ── */
  #controls {
    position: fixed; top: 14px; right: 14px;
    width: 272px;
    background: rgba(12, 12, 22, 0.92);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(100,150,255,0.1);
    border-radius: 14px;
    padding: 16px;
    z-index: 10;
    max-height: calc(100vh - 28px);
    overflow-y: auto;
    font-size: 13px;
    display: none;
  }
  #controls.visible { display: block; }
  #controls::-webkit-scrollbar { width: 3px; }
  #controls::-webkit-scrollbar-thumb { background: rgba(100,150,255,0.2); border-radius: 3px; }

  #controls h2 {
    font-size: 14px; font-weight: 600;
    color: #a0c4ff; margin-bottom: 14px;
    letter-spacing: 0.3px;
  }

  .ctrl-section {
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(100,150,255,0.07);
  }
  .ctrl-section:last-child { border-bottom: none; margin-bottom: 0; }
  .ctrl-section h3 {
    font-size: 10px; font-weight: 600;
    color: #6688aa; text-transform: uppercase;
    letter-spacing: 1.2px; margin-bottom: 7px;
  }

  .ctrl-row {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 5px;
  }
  .ctrl-row label { color: #8899aa; font-size: 12px; }
  .ctrl-row .val { color: #b0c0d0; font-size: 11px; min-width: 28px; text-align: right; font-variant-numeric: tabular-nums; }

  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 110px; height: 3px;
    background: rgba(100,150,255,0.12);
    border-radius: 2px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 12px; height: 12px;
    background: #64b4ff; border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 4px rgba(100,180,255,0.3);
  }
  input[type="checkbox"] { accent-color: #64b4ff; cursor: pointer; }

  .mode-buttons { display: flex; gap: 3px; margin-bottom: 7px; }
  .mode-btn {
    flex: 1; padding: 5px 2px;
    background: rgba(100,150,255,0.06);
    border: 1px solid rgba(100,150,255,0.12);
    border-radius: 6px; color: #7788aa;
    font-size: 11px; font-weight: 500;
    cursor: pointer; text-align: center;
    transition: all 0.2s;
  }
  .mode-btn:hover { background: rgba(100,150,255,0.12); color: #99aabb; }
  .mode-btn.active {
    background: rgba(100,180,255,0.15);
    border-color: #64b4ff;
    color: #64b4ff;
  }

  .playback-row {
    display: flex; gap: 5px; margin-bottom: 7px; align-items: center;
  }
  .play-btn {
    width: 28px; height: 28px;
    background: rgba(100,180,255,0.1);
    border: 1px solid rgba(100,180,255,0.25);
    border-radius: 50%; color: #64b4ff;
    font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .play-btn:hover { background: rgba(100,180,255,0.2); }
  #frame-slider { flex: 1; }
  #frame-display {
    color: #64b4ff; font-size: 11px;
    font-variant-numeric: tabular-nums;
    min-width: 50px; text-align: right;
  }

  /* ── Info Bar ── */
  #info-bar {
    position: fixed; bottom: 14px; left: 14px;
    background: rgba(12, 12, 22, 0.8);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(100,150,255,0.08);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 11px; color: #556677;
    z-index: 10; display: none;
  }
  #info-bar.visible { display: block; }
</style>
</head>
<body>

<!-- ── Drop/Upload Screen ── -->
<div id="drop-screen">
  <div class="drop-zone">
    <div class="drop-icon">📂</div>
    <div class="drop-title">Human3R Viewer</div>
    <div class="drop-subtitle">
      Select or drop your output folder<br>
      <span style="font-size:11px; color:#4a5a6a">(contains depth/, conf/, color/, camera/, smpl/)</span>
    </div>
    <label class="browse-btn" for="folder-input">Browse Folder</label>
    <input type="file" id="folder-input" webkitdirectory>
  </div>
  <div id="load-status"></div>
  <div class="loader-ring"></div>
</div>

<!-- ── 3D Canvas ── -->
<div id="canvas-container"></div>

<!-- ── Controls ── -->
<div id="controls">
  <h2>🧍 Human3R Viewer</h2>

  <div class="ctrl-section">
    <h3>View Mode</h3>
    <div class="mode-buttons">
      <button class="mode-btn" id="mode-4d" title="Only show current frame">4D</button>
      <button class="mode-btn active" id="mode-3d" title="Show all frames">3D</button>
      <button class="mode-btn" id="mode-hybrid" title="Current frame + all previous points">Hybrid</button>
    </div>
  </div>

  <div class="ctrl-section">
    <h3>Playback</h3>
    <div class="playback-row">
      <button class="play-btn" id="play-btn" title="Play/Pause">▶</button>
      <input type="range" id="frame-slider" min="0" max="0" value="0" step="1">
      <span id="frame-display">0 / 0</span>
    </div>
    <div class="ctrl-row">
      <label>FPS</label>
      <input type="range" id="fps-slider" min="1" max="60" value="10" step="1">
      <span class="val" id="fps-val">10</span>
    </div>
  </div>

  <div class="ctrl-section">
    <h3>Visibility</h3>
    <div class="ctrl-row"><label><input type="checkbox" id="show-bg" checked> Background</label></div>
    <div class="ctrl-row"><label><input type="checkbox" id="show-fg"> Foreground</label></div>
    <div class="ctrl-row"><label><input type="checkbox" id="show-cam" checked> Cameras</label></div>
  </div>

  <div class="ctrl-section">
    <h3>Quality</h3>
    <div class="ctrl-row">
      <label>Point Size</label>
      <input type="range" id="pt-size" min="0.5" max="10" value="2.5" step="0.1">
      <span class="val" id="pt-size-val">2.5</span>
    </div>
    <div class="ctrl-row">
      <label>Confidence</label>
      <input type="range" id="conf-thresh" min="0.1" max="30" value="1.5" step="0.1">
      <span class="val" id="conf-val">1.5</span>
    </div>
    <div class="ctrl-row">
      <label>Downsample</label>
      <input type="range" id="downsample" min="1" max="50" value="1" step="1">
      <span class="val" id="ds-val">1</span>
    </div>
    <div class="ctrl-row">
      <label>Mask Thresh</label>
      <input type="range" id="msk-thresh" min="0" max="1" value="0.1" step="0.01">
      <span class="val" id="msk-val">0.10</span>
    </div>
    <div class="ctrl-row">
      <label>Cam Size</label>
      <input type="range" id="cam-size" min="0.02" max="0.5" value="0.1" step="0.01">
      <span class="val" id="cam-size-val">0.10</span>
    </div>
  </div>

  <div class="ctrl-section">
    <button id="rebuild-btn" style="width:100%;padding:7px;background:rgba(100,180,255,0.1);border:1px solid rgba(100,180,255,0.2);border-radius:8px;color:#64b4ff;font-size:12px;cursor:pointer;font-weight:500;">⟳ Rebuild Point Clouds</button>
  </div>
</div>

<div id="info-bar">
  <span id="info-text">Orbit: Left Click · Pan: Right Click · Zoom: Scroll · Space: Play · ←→: Step</span>
</div>

<!-- Module imports for file:// compatibility -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.152.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/",
    "jszip": "https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"
  }
}
</script>
<!-- JSZip does not export as ES module, load it as a classic script -->
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

(function() {
  "use strict";

  // ═══════════════════════════════════════════════════════════════
  //  NPY / NPZ Parser (pure browser)
  // ═══════════════════════════════════════════════════════════════

  function parseNpy(buffer) {
    const view = new DataView(buffer);
    // Magic: \x93NUMPY
    const major = view.getUint8(6);
    let headerLen, headerOffset;
    if (major >= 2) {
      headerLen = view.getUint32(8, true);
      headerOffset = 12;
    } else {
      headerLen = view.getUint16(8, true);
      headerOffset = 10;
    }
    const headerBytes = new Uint8Array(buffer, headerOffset, headerLen);
    const headerStr = new TextDecoder().decode(headerBytes).trim();

    // Parse the Python dict header
    const descrMatch = headerStr.match(/'descr'\s*:\s*'([^']+)'/);
    const shapeMatch = headerStr.match(/'shape'\s*:\s*\(([^)]*)\)/);
    const orderMatch = headerStr.match(/'fortran_order'\s*:\s*(True|False)/);

    const descr = descrMatch ? descrMatch[1] : '<f4';
    const shapeStr = shapeMatch ? shapeMatch[1] : '';
    const shape = shapeStr.split(',').map(s => s.trim()).filter(s => s.length > 0).map(Number);

    const dataOffset = headerOffset + headerLen;
    const dataBuffer = buffer.slice(dataOffset);

    let typedArray;
    const dt = descr.replace(/[<>=|]/g, '');
    if (dt === 'f4') typedArray = new Float32Array(dataBuffer);
    else if (dt === 'f8') typedArray = new Float64Array(dataBuffer);
    else if (dt === 'i4') typedArray = new Int32Array(dataBuffer);
    else if (dt === 'i8') typedArray = new BigInt64Array(dataBuffer);
    else if (dt === 'u1' || dt === 'b1') typedArray = new Uint8Array(dataBuffer);
    else if (dt === 'i2') typedArray = new Int16Array(dataBuffer);
    else if (dt === 'u4') typedArray = new Uint32Array(dataBuffer);
    else typedArray = new Float32Array(dataBuffer); // fallback

    return { data: typedArray, shape, descr };
  }

  async function parseNpz(buffer) {
    const zip = await JSZip.loadAsync(buffer);
    const arrays = {};
    for (const [name, file] of Object.entries(zip.files)) {
      if (name.endsWith('.npy')) {
        const ab = await file.async('arraybuffer');
        const key = name.replace('.npy', '');
        arrays[key] = parseNpy(ab);
      }
    }
    return arrays;
  }

  // ═══════════════════════════════════════════════════════════════
  //  File Loading
  // ═══════════════════════════════════════════════════════════════

  async function loadOutputFolder(fileList) {
    const status = document.getElementById('load-status');
    document.getElementById('drop-screen').classList.add('loading');

    // Organize files by subfolder
    const fileMap = {}; // "depth/000000.npy" => File
    for (const f of fileList) {
      // webkitRelativePath: "folderName/depth/000000.npy"
      const parts = f.webkitRelativePath.split('/');
      // Skip the root folder name, keep the rest
      const relPath = parts.slice(1).join('/');
      fileMap[relPath] = f;
    }

    // Find frame count from depth folder
    const depthFiles = Object.keys(fileMap)
      .filter(p => p.startsWith('depth/') && p.endsWith('.npy'))
      .sort();
    const B = depthFiles.length;

    if (B === 0) {
      status.textContent = '❌ No depth frames found. Make sure you selected the correct output folder.';
      document.getElementById('drop-screen').classList.remove('loading');
      return null;
    }

    status.textContent = `Found ${B} frames. Loading...`;

    const frames = [];

    for (let i = 0; i < B; i++) {
      const fid = String(i).padStart(6, '0');
      status.textContent = `Loading frame ${i + 1} / ${B}...`;

      // Load depth
      const depthFile = fileMap[`depth/${fid}.npy`];
      if (!depthFile) { status.textContent = `❌ Missing depth/${fid}.npy`; return null; }
      const depthNpy = parseNpy(await depthFile.arrayBuffer());

      // Load conf
      const confFile = fileMap[`conf/${fid}.npy`];
      if (!confFile) { status.textContent = `❌ Missing conf/${fid}.npy`; return null; }
      const confNpy = parseNpy(await confFile.arrayBuffer());

      // Load color PNG
      const colorFile = fileMap[`color/${fid}.png`];
      if (!colorFile) { status.textContent = `❌ Missing color/${fid}.png`; return null; }
      const colorBitmap = await createImageBitmap(colorFile);
      const canvas = new OffscreenCanvas(colorBitmap.width, colorBitmap.height);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(colorBitmap, 0, 0);
      const imgData = ctx.getImageData(0, 0, colorBitmap.width, colorBitmap.height);
      colorBitmap.close();

      // Load camera npz
      const camFile = fileMap[`camera/${fid}.npz`];
      if (!camFile) { status.textContent = `❌ Missing camera/${fid}.npz`; return null; }
      const camNpz = await parseNpz(await camFile.arrayBuffer());

      // Load smpl npz (just for mask)
      const smplFile = fileMap[`smpl/${fid}.npz`];
      let mskData = null;
      if (smplFile) {
        const smplNpz = await parseNpz(await smplFile.arrayBuffer());
        if (smplNpz.msk && smplNpz.msk.data.length > 1) {
          mskData = smplNpz.msk;
        }
      }

      const H = depthNpy.shape[0];
      const W = depthNpy.shape[1];
      const depth = depthNpy.data;
      const conf = confNpy.data;
      const pose = camNpz.pose.data;     // 4x4 flat
      const intrinsics = camNpz.intrinsics.data; // 3x3 flat

      const fx = intrinsics[0]; // [0,0]
      const fy = intrinsics[4]; // [1,1]
      const cx = intrinsics[2]; // [0,2]
      const cy = intrinsics[5]; // [1,2]

      // Camera rotation and translation from pose (4x4 row-major)
      const R = [
        pose[0], pose[1], pose[2],
        pose[4], pose[5], pose[6],
        pose[8], pose[9], pose[10]
      ];
      const t = [pose[3], pose[7], pose[11]];

      // Reconstruct 3D points in camera space and transform to world
      const pts = new Float32Array(H * W * 3);
      const cols = new Float32Array(H * W * 3);
      const confArr = new Float32Array(H * W);
      const mskArr = new Float32Array(H * W);

      for (let v = 0; v < H; v++) {
        for (let u = 0; u < W; u++) {
          const idx = v * W + u;
          const z = depth[idx];
          const x_cam = (u - cx) * z / fx;
          const y_cam = (v - cy) * z / fy;

          // World coords: R * [x,y,z] + t
          const x_w = R[0]*x_cam + R[1]*y_cam + R[2]*z + t[0];
          const y_w = R[3]*x_cam + R[4]*y_cam + R[5]*z + t[1];
          const z_w = R[6]*x_cam + R[7]*y_cam + R[8]*z + t[2];

          pts[idx*3]     = x_w;
          pts[idx*3 + 1] = y_w;
          pts[idx*3 + 2] = z_w;

          // Color from image (RGBA → RGB normalized)
          cols[idx*3]     = imgData.data[idx*4]     / 255;
          cols[idx*3 + 1] = imgData.data[idx*4 + 1] / 255;
          cols[idx*3 + 2] = imgData.data[idx*4 + 2] / 255;

          confArr[idx] = conf[idx];

          if (mskData) {
            // mask might be (1, H, W) or (H, W)
            const mskIdx = mskData.shape.length === 3 ? idx : idx;
            mskArr[idx] = mskData.data[mskIdx] || 0;
          }
        }
      }

      frames.push({
        H, W, pts, cols, conf: confArr, msk: mskArr,
        camR: R, camT: t, focal: fx, pp: [cx, cy]
      });
    }

    status.textContent = `✓ Loaded ${B} frames. Building scene...`;
    return frames;
  }

  // ═══════════════════════════════════════════════════════════════
  //  Three.js Viewer
  // ═══════════════════════════════════════════════════════════════

  let scene, camera, renderer, controls;
  let pointClouds = [];
  let cameraFrustums = [];
  let frames = [];
  let currentFrame = 0;
  let playing = false;
  let lastFrameTime = 0;
  let viewMode = '3d';

  function viridis(t) {
    const stops = [
      [0.267,0.004,0.329],[0.282,0.140,0.458],[0.254,0.265,0.530],
      [0.207,0.372,0.553],[0.164,0.471,0.558],[0.128,0.567,0.551],
      [0.135,0.659,0.518],[0.267,0.749,0.441],[0.478,0.821,0.318],
      [0.741,0.873,0.150],[0.993,0.906,0.144]
    ];
    const idx = t * (stops.length - 1);
    const lo = Math.floor(idx), hi = Math.min(lo + 1, stops.length - 1);
    const f = idx - lo;
    return stops[lo].map((v, i) => v + f * (stops[hi][i] - v));
  }

  function initThree() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x08080e);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(0, -2, 5);
    camera.up.set(0, -1, 0); // Y-down

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.rotateSpeed = 0.8;
    controls.panSpeed = 0.5;

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const d = new THREE.DirectionalLight(0xffffff, 0.7);
    d.position.set(5, -10, 7);
    scene.add(d);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  }

  function buildPointClouds() {
    const confThresh = parseFloat(document.getElementById('conf-thresh').value);
    const ds = parseInt(document.getElementById('downsample').value);
    const mskThresh = parseFloat(document.getElementById('msk-thresh').value);
    const showBg = document.getElementById('show-bg').checked;
    const showFg = document.getElementById('show-fg').checked;
    const ptSize = parseFloat(document.getElementById('pt-size').value);

    // Remove old
    pointClouds.forEach(pc => { pc.geometry.dispose(); pc.material.dispose(); scene.remove(pc); });
    pointClouds = [];

    for (let i = 0; i < frames.length; i++) {
      const f = frames[i];
      const N = f.H * f.W;
      const posArr = [];
      const colArr = [];

      for (let j = 0; j < N; j += ds) {
        if (f.conf[j] <= confThresh) continue;
        const isFg = f.msk[j] > mskThresh;
        if (showBg && showFg) { /* all */ }
        else if (showBg && !showFg && isFg) continue;
        else if (showFg && !showBg && !isFg) continue;
        else if (!showBg && !showFg) continue;

        posArr.push(f.pts[j*3], f.pts[j*3+1], f.pts[j*3+2]);
        colArr.push(f.cols[j*3], f.cols[j*3+1], f.cols[j*3+2]);
      }

      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.Float32BufferAttribute(posArr, 3));
      geom.setAttribute('color', new THREE.Float32BufferAttribute(colArr, 3));
      const mat = new THREE.PointsMaterial({
        size: ptSize * 0.003,
        vertexColors: true,
        sizeAttenuation: true,
      });
      const pc = new THREE.Points(geom, mat);
      scene.add(pc);
      pointClouds.push(pc);
    }
    updateVisibility();
  }

  function buildCameras() {
    cameraFrustums.forEach(g => { scene.remove(g); });
    cameraFrustums = [];
    const camSize = parseFloat(document.getElementById('cam-size').value);
    const B = frames.length;

    for (let i = 0; i < B; i++) {
      const f = frames[i];
      const vc = viridis(B > 1 ? i / (B - 1) : 0);
      const color = new THREE.Color(vc[0], vc[1], vc[2]);
      const aspect = f.pp[0] / f.pp[1];
      const hW = camSize * aspect * 0.5;
      const hH = camSize * 0.5;
      const depth = camSize;
      const corners = [
        [-hW, -hH, depth], [hW, -hH, depth],
        [hW, hH, depth], [-hW, hH, depth]
      ];
      const o = [0, 0, 0];
      const linePos = [];
      for (const c of corners) {
        linePos.push(o[0], o[1], o[2], c[0], c[1], c[2]);
      }
      for (let k = 0; k < 4; k++) {
        const a = corners[k], b = corners[(k+1)%4];
        linePos.push(a[0], a[1], a[2], b[0], b[1], b[2]);
      }
      const lg = new THREE.BufferGeometry();
      lg.setAttribute('position', new THREE.Float32BufferAttribute(linePos, 3));
      const lm = new THREE.LineBasicMaterial({ color });
      const ls = new THREE.LineSegments(lg, lm);

      const R = f.camR;
      const t = f.camT;
      const m = new THREE.Matrix4();
      m.set(
        R[0], R[1], R[2], t[0],
        R[3], R[4], R[5], t[1],
        R[6], R[7], R[8], t[2],
        0, 0, 0, 1
      );
      ls.applyMatrix4(m);
      scene.add(ls);
      cameraFrustums.push(ls);
    }
    updateVisibility();
  }

  function updateVisibility() {
    const showCam = document.getElementById('show-cam').checked;
    const B = frames.length;
    for (let i = 0; i < B; i++) {
      let pcVis = false;
      if (viewMode === '3d') pcVis = true;
      else if (viewMode === '4d') pcVis = (i === currentFrame);
      else if (viewMode === 'hybrid') pcVis = (i <= currentFrame);

      if (pointClouds[i]) pointClouds[i].visible = pcVis;
      if (cameraFrustums[i]) cameraFrustums[i].visible = showCam;
    }
  }

  function updatePointSize() {
    const ps = parseFloat(document.getElementById('pt-size').value) * 0.003;
    pointClouds.forEach(pc => { pc.material.size = ps; });
  }

  // ═══════════════════════════════════════════════════════════════
  //  Controls Wiring
  // ═══════════════════════════════════════════════════════════════

  function wireControls() {
    // Mode
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        viewMode = btn.id.replace('mode-', '');
        updateVisibility();
      });
    });

    // Play
    const playBtn = document.getElementById('play-btn');
    playBtn.addEventListener('click', () => {
      playing = !playing;
      playBtn.textContent = playing ? '⏸' : '▶';
    });

    // Frame slider
    const fs = document.getElementById('frame-slider');
    fs.addEventListener('input', () => {
      currentFrame = parseInt(fs.value);
      document.getElementById('frame-display').textContent = `${currentFrame} / ${frames.length - 1}`;
      updateVisibility();
    });

    // FPS
    document.getElementById('fps-slider').addEventListener('input', function() {
      document.getElementById('fps-val').textContent = this.value;
    });

    // Point size (live update, no rebuild)
    document.getElementById('pt-size').addEventListener('input', function() {
      document.getElementById('pt-size-val').textContent = parseFloat(this.value).toFixed(1);
      updatePointSize();
    });

    // Value displays for sliders
    document.getElementById('conf-thresh').addEventListener('input', function() {
      document.getElementById('conf-val').textContent = parseFloat(this.value).toFixed(1);
    });
    document.getElementById('downsample').addEventListener('input', function() {
      document.getElementById('ds-val').textContent = this.value;
    });
    document.getElementById('msk-thresh').addEventListener('input', function() {
      document.getElementById('msk-val').textContent = parseFloat(this.value).toFixed(2);
    });
    document.getElementById('cam-size').addEventListener('input', function() {
      document.getElementById('cam-size-val').textContent = parseFloat(this.value).toFixed(2);
    });

    // Rebuild button
    document.getElementById('rebuild-btn').addEventListener('click', () => {
      buildPointClouds();
      buildCameras();
    });

    // Visibility checkboxes
    ['show-bg', 'show-fg'].forEach(id => {
      document.getElementById(id).addEventListener('change', buildPointClouds);
    });
    document.getElementById('show-cam').addEventListener('change', updateVisibility);

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === ' ') {
        e.preventDefault();
        playing = !playing;
        playBtn.textContent = playing ? '⏸' : '▶';
      } else if (e.key === 'ArrowRight') {
        currentFrame = (currentFrame + 1) % frames.length;
        fs.value = currentFrame;
        document.getElementById('frame-display').textContent = `${currentFrame} / ${frames.length - 1}`;
        updateVisibility();
      } else if (e.key === 'ArrowLeft') {
        currentFrame = (currentFrame - 1 + frames.length) % frames.length;
        fs.value = currentFrame;
        document.getElementById('frame-display').textContent = `${currentFrame} / ${frames.length - 1}`;
        updateVisibility();
      }
    });
  }

  // ═══════════════════════════════════════════════════════════════
  //  Animation Loop
  // ═══════════════════════════════════════════════════════════════

  function animate(ts) {
    requestAnimationFrame(animate);
    if (playing) {
      const fps = parseInt(document.getElementById('fps-slider').value);
      if (ts - lastFrameTime >= 1000 / fps) {
        lastFrameTime = ts;
        currentFrame = (currentFrame + 1) % frames.length;
        document.getElementById('frame-slider').value = currentFrame;
        document.getElementById('frame-display').textContent = `${currentFrame} / ${frames.length - 1}`;
        updateVisibility();
      }
    }
    controls.update();
    renderer.render(scene, camera);
  }

  // ═══════════════════════════════════════════════════════════════
  //  File Input / Drag & Drop
  // ═══════════════════════════════════════════════════════════════

  async function handleFiles(fileList) {
    frames = await loadOutputFolder(fileList);
    if (!frames) return;

    document.getElementById('frame-slider').max = frames.length - 1;
    document.getElementById('frame-display').textContent = `0 / ${frames.length - 1}`;

    initThree();
    buildPointClouds();
    buildCameras();
    wireControls();

    // Focus camera on first frame's camera position
    if (frames.length > 0) {
      const t = frames[0].camT;
      controls.target.set(t[0], t[1], t[2]);
      camera.position.set(t[0], t[1] - 3, t[2] + 5);
      controls.update();
    }

    document.getElementById('drop-screen').classList.add('hidden');
    document.getElementById('controls').classList.add('visible');
    document.getElementById('info-bar').classList.add('visible');

    requestAnimationFrame(animate);
  }

  // Browse button
  document.getElementById('folder-input').addEventListener('change', (e) => {
    if (e.target.files.length > 0) handleFiles(e.target.files);
  });

  // Drag & drop
  const ds = document.getElementById('drop-screen');
  ds.addEventListener('dragover', (e) => { e.preventDefault(); ds.classList.add('drag-over'); });
  ds.addEventListener('dragleave', () => { ds.classList.remove('drag-over'); });
  ds.addEventListener('drop', async (e) => {
    e.preventDefault();
    ds.classList.remove('drag-over');

    // Try to get files from dataTransfer
    const items = e.dataTransfer.items;
    if (items && items.length > 0) {
      const allFiles = [];
      const promises = [];

      for (const item of items) {
        const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
        if (entry) {
          promises.push(readEntryRecursive(entry, ''));
        }
      }

      const results = await Promise.all(promises);
      for (const r of results) allFiles.push(...r);

      if (allFiles.length > 0) {
        // Create a fake file list with webkitRelativePath
        handleFiles(allFiles);
      }
    }
  });

  async function readEntryRecursive(entry, path) {
    const files = [];
    if (entry.isFile) {
      const file = await new Promise(resolve => entry.file(resolve));
      // Simulate webkitRelativePath
      Object.defineProperty(file, 'webkitRelativePath', {
        value: path + entry.name,
        writable: false
      });
      files.push(file);
    } else if (entry.isDirectory) {
      const reader = entry.createReader();
      let entries = [];
      // readEntries may not return all at once
      let batch;
      do {
        batch = await new Promise(resolve => reader.readEntries(resolve));
        entries = entries.concat(batch);
      } while (batch.length > 0);

      for (const child of entries) {
        const childFiles = await readEntryRecursive(child, path + entry.name + '/');
        files.push(...childFiles);
      }
    }
    return files;
  }

})();
</script>
